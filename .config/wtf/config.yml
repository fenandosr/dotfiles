wtf:
  colors:
    border:
      focusable: darkslateblue
      focused: orange
      normal: gray
  grid:
    columns: [32, 32, 32, 32, 90]
    rows: [10, 10, 10, 4, 4, 90]
  refreshInterval: 1
  mods:

    # ── Sistema ─────────────────────────────────────────────────────────
    clocks:
      type: "clocks"
      colors:
        rows:
          even: "lightblue"
          odd: "white"
      enabled: true
      locations:
        "CDMX": "America/Mexico_City"
        "Vancouver": "America/Vancouver"
        "Toronto": "America/Toronto"
        "Barcelona": "Europe/Madrid"
        "Dubai": "Asia/Dubai"
      position:
        top: 0
        left: 0
        height: 1
        width: 1
      refreshInterval: 15
      sort: "alphabetical"
      title: "Hora"

    ipinfo:
      colors:
        name: "lightblue"
        value: "white"
      enabled: true
      position:
        top: 1
        left: 0
        height: 1
        width: 1
      refreshInterval: 150

    disk:
      args: ["-h", "/home/fenan"]
      cmd: "df"
      enabled: true
      position:
        top: 2
        left: 0
        height: 1
        width: 1
      refreshInterval: 60
      title: "Disco"
      type: cmdrunner

    uptime:
      args: []
      cmd: "uptime"
      enabled: true
      position:
        top: 3
        left: 0
        height: 1
        width: 1
      refreshInterval: 30
      type: cmdrunner

    # ── Trabajo ──────────────────────────────────────────────────────────
    git_repos:
      type: "git"
      commitCount: 5
      commitFormat: "[forestgreen]%h [white]%s"
      enabled: true
      repositories:
        - "/home/fenan/repos/wgadmin"
        - "/home/fenan/repos/pgscat"
        - "/home/fenan/repos/iris-lib"
        - "/home/fenan/repos/gann"
        - "/home/fenan/repos/dragen_cnv"
        - "/home/fenan/repos/dprism-mcps-prs-t2d-ahuerta"
      position:
        top: 0
        left: 1
        height: 2
        width: 2
      refreshInterval: 30
      title: "Git Repos"

    todo:
      type: "todo"
      checkedIcon: "X"
      filePath: "/home/fenan/.config/wtf/todo.txt"
      enabled: true
      position:
        top: 2
        left: 1
        height: 2
        width: 2
      refreshInterval: 3600
      title: "Pendientes"

    # ── Recursos ─────────────────────────────────────────────────────────
    memory:
      args: ["-h"]
      cmd: "free"
      enabled: true
      position:
        top: 0
        left: 3
        height: 1
        width: 1
      refreshInterval: 15
      title: "Memoria"
      type: cmdrunner

    power:
      enabled: true
      position:
        top: 1
        left: 3
        height: 1
        width: 1
      refreshInterval: 15
      title: "⚡️"

    # ── Feeds ─────────────────────────────────────────────────────────────
    noticias:
      type: "feedreader"
      enabled: true
      feeds:
        - "https://feeds.bbci.co.uk/news/world/rss.xml"
        - "https://rss.nytimes.com/services/xml/rss/nyt/World.xml"
      feedLimit: 10
      position:
        top: 0
        left: 4
        height: 2
        width: 1
      refreshInterval: 3600
      title: "Noticias"

    ciencia:
      type: "feedreader"
      enabled: true
      feeds:
        - "https://connect.biorxiv.org/biorxiv_xml.php?subject=genomics"
        - "https://journals.plos.org/plosgenetics/article/feed"
      feedLimit: 10
      position:
        top: 2
        left: 4
        height: 2
        width: 1
      refreshInterval: 7200
      title: "Genómica"
