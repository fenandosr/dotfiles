#
# Core Options
#
set-option -g default-shell $SHELL
set-window-option -g xterm-keys on
set-option -g history-limit 50000
set-option -g base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on
set-option -g prefix C-q
unbind C-b
set-option -s escape-time 0
set-option -g focus-events on
set-option -g mouse on
set-option -g allow-rename off
set-option -g default-terminal "tmux-256color"
set-option -as terminal-overrides ",*:RGB"

# Reload Configuration
bind-key r source-file ~/.tmux.conf \; display-message "Config recargada."

# Activity monitoring
set-window-option -g monitor-activity on
set-option -g visual-activity on
set-option -g message-style fg=white,bg=black,bright

#
# Copy Mode (Vi)
#
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Clipboard: WSL usa clip.exe, macOS usa pbcopy
if-shell "grep -qi microsoft /proc/version 2>/dev/null" \
    'bind-key -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel "clip.exe"' \
    'bind-key -T copy-mode-vi y     send-keys -X copy-pipe-and-cancel "pbcopy"'

if-shell "grep -qi microsoft /proc/version 2>/dev/null" \
    'bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "clip.exe"' \
    'bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"'

#
# Status Line
#
set-option -g status-interval 5
set-option -g status-justify centre
set-option -g status-left-length 40
set-option -g status-left "#[fg=green][#S] :: #[fg=yellow]#I"
set-option -g status-right "#[fg=cyan]%d %b %R"
set-option -g status-style fg=white,bg=black

#
# Windows
#
bind-key | split-window -h
bind-key - split-window -v
bind-key C-p previous-window
bind-key C-n next-window
set-window-option -g window-status-current-format "| #I: #W |"
set-window-option -g window-status-style fg=cyan,bg=default,dim
set-window-option -g window-status-current-style fg=black,bg=cyan,bright

#
# Panes
#
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
# -r: repetible manteniendo el prefix presionado
bind-key -r H resize-pane -L 2
bind-key -r J resize-pane -D 2
bind-key -r K resize-pane -U 2
bind-key -r L resize-pane -R 2
set-option -g pane-border-style fg=cyan
set-option -g pane-active-border-style fg=red
